<!DOCTYPE html>
<html lang="fa">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>REYE Vein Finder</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" href="icons/favicon-32x32.png" sizes="32x32">
  <style>
    body {
      font-family: sans-serif;
      text-align: center;
      direction: rtl;
      background: #f7f7f7;
      margin: 0;
      padding: 0;
    }
    #batteryIcon {
      position: absolute;
      top: 10px;
      left: 10px;
      font-size: 18px;
    }
    #controls {
      margin-top: 20px;
    }
    button {
      margin: 10px;
      padding: 10px 20px;
      font-size: 16px;
    }
    #imageContainer {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-top: 20px;
    }
    .landscape #imageContainer {
      flex-direction: row;
    }
    #videoElement, #processedCanvas {
      width: 400px;
      height: 300px;
      border: 1px solid #ccc;
      object-fit: contain;
    }
    #footer {
      margin-top: 20px;
      font-size: 14px;
      color: gray;
    }
    #copyright {
      position: fixed;
      bottom: 5px;
      left: 10px;
      font-size: 12px;
      color: gray;
    }
  </style>
</head>
<body>
  <div id="batteryIcon">🔋 --%</div>

  <div id="welcomePage">
    <h1>👋 REYE Vein Finder </h1>
    <p>لطفاً ابتدا به وای‌فای دستگاه رگیاب با نام REYE متصل شوید.</p>
    <button id="connectBtn">اتصال و ورود</button>
  </div>

  <div id="mainPage" style="display:none;">
    <div id="controls">
      <button id="togglePinBtn">🟢 روشن کردن نورافکن</button>
      <button id="startStreamBtn">🎥 شروع نمایش تصویر</button>
    </div>

    <div id="imageContainer">
      <img id="videoElement" crossorigin="anonymous" />
      <canvas id="processedCanvas" width="400" height="300"></canvas>
    </div>
    <div id="pinStatus">🔌 نورافکن خاموش است.</div>
  </div>

  <div id="copyright">©reye.ir</div>

  <script>
    const connectBtn = document.getElementById("connectBtn");
    const togglePinBtn = document.getElementById("togglePinBtn");
    const pinStatus = document.getElementById("pinStatus");
    const videoElement = document.getElementById("videoElement");
    const canvas = document.getElementById("processedCanvas");
    const ctx = canvas.getContext("2d");
    let streaming = false;
    let processInterval;

    connectBtn.onclick = () => {
      const script = document.createElement('script');
      script.src = "opencv.js";
      script.onload = () => {
        document.getElementById("welcomePage").style.display = "none";
        document.getElementById("mainPage").style.display = "block";
        fetchBatteryStatus();
        setInterval(fetchBatteryStatus, 15000);
        updateLayout();
      };
      script.onerror = () => alert("خطا در بارگذاری opencv.js");
      document.body.appendChild(script);
    };

    togglePinBtn.onclick = () => {
      fetch('http://192.168.1.110/togglePin')
        .then(res => res.text())
        .then(state => {
          if (state === "ON") {
            togglePinBtn.textContent = "🔴 خاموش کردن نورافکن";
            pinStatus.textContent = "✅ نورافکن روشن است.";
            pinStatus.style.color = "green";
          } else {
            togglePinBtn.textContent = "🟢 روشن کردن نورافکن";
            pinStatus.textContent = "🔌 نورافکن خاموش است.";
            pinStatus.style.color = "gray";
          }
        });
    };

    document.getElementById("startStreamBtn").onclick = () => {
      if (!streaming) {
        videoElement.src = "http://192.168.1.110:81/stream";
        streaming = true;

        // شروع پردازش هر 100 میلی‌ثانیه
        processInterval = setInterval(processFrame, 100);

        document.getElementById("startStreamBtn").textContent = "⏹️ توقف نمایش";
      } else {
        // توقف استریم و پردازش
        videoElement.src = "";
        streaming = false;

        if (processInterval) {
          clearInterval(processInterval);
          processInterval = null;
        }

        // پاک کردن بوم پردازش‌شده
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        document.getElementById("startStreamBtn").textContent = "🎥 شروع نمایش تصویر";
      }
    };


    function processFrame() {
      fetch("http://192.168.1.110/capture")
        .then(res => res.blob())
        .then(blob => {
          let img = new Image();
          img.onload = function () {
            ctx.drawImage(img, 0, 0, 400, 300);
            let src = cv.imread(canvas);
            let green = new cv.Mat();
            let dst = new cv.Mat();
            let channels = new cv.MatVector();

            cv.cvtColor(src, dst, cv.COLOR_RGBA2RGB);
            cv.split(dst, channels);
            green = channels.get(1);
            cv.GaussianBlur(green, green, new cv.Size(5, 5), 0);
            cv.imshow("processedCanvas", green);

            src.delete(); dst.delete(); green.delete(); channels.delete();
          };
          img.src = URL.createObjectURL(blob);
        });
    }

    function updateBatteryIcon(percent) {
      const batteryText = document.getElementById("batteryIcon");
      let symbol = "🔋";
      if (percent < 25) symbol = "🟥⚠️";
      else if (percent < 50) symbol = "🟥";
      else if (percent < 75) symbol = "🟨";
      batteryText.textContent = symbol + " " + percent + "%";
    }

    function fetchBatteryStatus() {
      fetch('http://192.168.1.110/battery')
        .then(res => res.json())
        .then(data => {
          if (typeof data.percent === 'number') {
            updateBatteryIcon(data.percent);
          }
        });
    }

    function updateLayout() {
      if (window.innerWidth > window.innerHeight) {
        document.body.classList.add("landscape");
      } else {
        document.body.classList.remove("landscape");
      }
    }

    window.addEventListener("resize", updateLayout);
    window.addEventListener("orientationchange", updateLayout);
    window.addEventListener("load", updateLayout);
    
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/service-worker.js')
          .then(reg => console.log('Service Worker registered:', reg))
          .catch(err => console.error('Service Worker registration failed:', err));
      });
    }
  </script>
</body>
</html>
